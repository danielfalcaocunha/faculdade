<!DOCTYPE html> <html>
    <head>
        <meta charset="utf-8">
        <title>Exemplo de página</title>
    </head>
    <body>
        <p>Esta é uma página para testes</p>
        <p>Apresentando listas:</p>
        <ol>
            <li>Primeiro ítem</li>
            <li>Segundo ítem</li>
        </ol>
        <ul>
            <li>Vermelho</li>
            <li>Azul</li>
        </ul>
        <p>Tabela:</p>
        <table width=""100% border="1">
            <tr>
                <th>Ítem</th>
                <th>Quantidade</th>
                <th>Total</th>
            </tr>
            <tr>
                <td>Registro 01</td>
                <td>3</td>
                <td>R$ 30,00</td>
            </tr>
            <tr>
                <td>Registro 02</td>
                <td>2</td>
                <td>R$ 40,00</td>
            </tr>
            <tfoot>
                <tr>
                    <th>Total</th>
                    <th>5</th>
                    <th>R$ 70,00</th>
                </tr>
            </tfoot>
        </table>
    </body>
</html>
