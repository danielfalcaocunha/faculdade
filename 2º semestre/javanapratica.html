<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Java Script na prática</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body class="container">
  <form class="form m-2" onsubmit="return false;">
    <label class="form-label">Valor A</label> <input class="form-control" type="number" id="v1" step="any" />
    <label class="form-label">Valor B</label> <input class="form-control" type="number" id="v2" step="any" />
    <label class="form-label">Operação</label>
    <select class="form-select" id="oper">
      <option>Soma</option>
      <option>Subtração</option>
      <option>Multiplicação</option>
      <option>Divisão</option>
      <option>Potência</option>
    </select>
    <button class="btn btn-primary m-2" type="button" id="btnExecutar">Executar</button>
  </form>

  <div class="alert alert-success" id="resp">O resultado aparece aqui</div>

  <script src="arquivo.js"></script>
  <script>
    const lerNumero = (id) => {
      const n = parseFloat(document.getElementById(id).value);
      return isNaN(n) ? null : n;
    };

    const executar = () => {
      const a = lerNumero("v1");
      const b = lerNumero("v2");
      const oper = document.getElementById("oper").selectedIndex;

      if (a === null || b === null) {
        document.getElementById("resp").textContent = "Informe números válidos.";
        return;
      }

      let resultado = null;
      switch (oper) {
        case 0: resultado = somar(a, b); break;
        case 1: resultado = subtrair(a, b); break;
        case 2: resultado = multiplicar(a, b); break;
        case 3: resultado = dividir(a, b); break;
        case 4: resultado = exponencial(a, b); break;
      }

      if (resultado === null) {
        document.getElementById("resp").textContent = "Operação inválida ou não foi possível calcular.";
      } else {
        document.getElementById("resp").textContent = `O resultado da operação é: ${resultado}`;
      }
    };

    document.getElementById("btnExecutar").addEventListener("click", executar);
  </script>
</body>
</html>
