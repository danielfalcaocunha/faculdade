<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de IMC</title>

  <!-- Bootstrap 5 (confira se o integrity corresponde à versão) -->
  https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css
</head>
<body class="container py-4">
  <h1 class="mb-3">Calculadora de IMC</h1>

  <form class="form m-2" onsubmit="return false;">
    <div class="mb-3">
      <label class="form-label" for="v1">Peso (kg)</label>
      <input class="form-control" type="number" id="v1" min="1" step="0.1" required />
    </div>

    <div class="mb-3">
      <label class="form-label" for="v2">Altura (m)</label>
      <input class="form-control" type="number" id="v2" min="0.3" step="0.01" required />
    </div>

    <button class="btn btn-primary m-2" type="button" id="btnExecutar">Executar</button>
    #Executar (link)</a>
  </form>

  <h2 id="resultado" class="mt-3">O resultado é:</h2>

  <!-- Seu script externo (se precisar dele). Use defer OU coloque no final. -->
  <!-- 16.imc.js</script> -->

  <script>
    // Se já tiver isto no 16.imc.js, pode remover daqui.
    function imc(peso, altura) {
      return peso / (altura * altura);
    }

    function situacao(valorIMC) {
      if (valorIMC < 18.5) return "Abaixo do peso";
      if (valorIMC < 25) return "Peso normal";
      if (valorIMC < 30) return "Sobrepeso";
      if (valorIMC < 35) return "Obesidade grau I";
      if (valorIMC < 40) return "Obesidade grau II";
      return "Obesidade grau III";
    }

    function executar() {
      const peso = parseFloat(document.getElementById("v1").value);
      const altura = parseFloat(document.getElementById("v2").value);

      const saida = document.getElementById("resultado");

      if (!isFinite(peso) || !isFinite(altura) || peso <= 0 || altura <= 0) {
        saida.textContent = "Informe números válidos.";
        return;
      }

      const valorIMC = imc(peso, altura);
      const status = situacao(valorIMC);

      saida.textContent = `IMC: ${valorIMC.toFixed(2)} — ${status}`;
    }

    // Conecta o botão e o link à função
    document.getElementById("btnExecutar").addEventListener("click", executar);
    document.getElementById("linkExecutar").addEventListener("click", function (e) {
      e.preventDefault();
      executar();
    });
  </script>
</body>
</html>
